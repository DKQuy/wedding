<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quý & Linh Wedding</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #fff;
      color: #333;
      text-align: center;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    section {
      padding: 60px 20px;
    }

    .hero {
      height: 100vh;
      background: url('https://picsum.photos/1200/800') center/cover no-repeat;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .overlay {
      background: rgba(0,0,0,0.4);
      padding: 40px;
    }

    .countdown {
      font-size: 24px;
      margin-top: 20px;
    }

    .timeline {
      max-width: 600px;
      margin: auto;
      text-align: left;
    }

    .timeline div {
      margin: 20px 0;
      border-left: 2px solid #d6336c;
      padding-left: 15px;
    }

    .gallery img {
      width: 100%;
      max-width: 300px;
      margin: 10px;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 10px;
    }

    button {
      padding: 15px 25px;
      background: #d6336c;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Quý & Linh</h1>
    <h2>01.01.2027</h2>
    <div class="countdown" id="countdown"></div>
  </div>
</section>

<!-- STORY -->
<section>
  <h2>Chuyện chúng mình</h2>
  <div class="timeline">
    <div>💖 2022: Gặp nhau</div>
    <div>💍 2025: Đính hôn</div>
    <div>🎉 2027: Kết hôn</div>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2>Album</h2>
  <div class="gallery">
    <img src="https://picsum.photos/300/300?1">
    <img src="https://picsum.photos/300/300?2">
    <img src="https://picsum.photos/300/300?3">
  </div>
</section>

<!-- MAP -->
<section>
  <h2>Địa điểm</h2>
  <iframe src="https://maps.google.com/maps?q=ho%20chi%20minh&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<!-- RSVP -->
<section>
  <h2>Xác nhận tham dự</h2>
  <button onclick="window.open('https://forms.gle/', '_blank')">
    RSVP ngay
  </button>
</section>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  const weddingDate = new Date("2027-01-01").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const distance = weddingDate - now;

    const d = Math.floor(distance / (1000 * 60 * 60 * 24));
    const h = Math.floor((distance / (1000 * 60 * 60)) % 24);

    document.getElementById("countdown").innerHTML =
      d + " ngày " + h + " giờ";
  }, 1000);
</script>

</body>
</html>
